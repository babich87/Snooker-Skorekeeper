            <button onclick="handlePot('brown')" id="ball-brown" class="ball-shadow bg-amber-800 w-full aspect-square rounded-full flex items-center justify-center font-bold text-white text-xl border-4 border-white/10 active:scale-90 transition-transform">4</button>
            <button onclick="handlePot('blue')" id="ball-blue" class="ball-shadow bg-blue-600 w-full aspect-square rounded-full flex items-center justify-center font-bold text-white text-xl border-4 border-white/10 active:scale-90 transition-transform">5</button>
            <button onclick="handlePot('pink')" id="ball-pink" class="ball-shadow bg-pink-400 w-full aspect-square rounded-full flex items-center justify-center font-bold text-white text-xl border-4 border-white/10 active:scale-90 transition-transform">6</button>
            <button onclick="handlePot('black')" id="ball-black" class="ball-shadow bg-zinc-900 w-full aspect-square rounded-full flex items-center justify-center font-bold text-white text-xl border-4 border-white/10 active:scale-90 transition-transform">7</button>

                <span class="text-[10px] font-bold uppercase tracking-widest text-red-500">Foul</span>
            </button>
            <button onclick="endFrame()" class="flex flex-col items-center justify-center bg-green-900/10 py-5 rounded-2xl border border-green-900/30 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1 text-green-500"><path d="m6 9 6 6 6-6"></path></svg>
                <span class="text-[10px] font-bold uppercase tracking-widest text-green-500">Frame</span>

        <footer class="mt-auto pt-10 pb-4 text-[10px] text-zinc-600 text-center uppercase tracking-[0.3em] font-bold">

    <!-- Foul Modal -->
    <div id="foul-modal" class="hidden fixed inset-0 z-[60] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-zinc-900 w-full max-w-xs rounded-3xl p-6 border border-zinc-800 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-center text-red-500 tracking-tight">FOUL PENALTY</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="handleFoul(4)" class="bg-zinc-800 hover:bg-zinc-700 py-5 rounded-2xl text-3xl font-black border border-zinc-700/50">4</button>
                <button onclick="handleFoul(5)" class="bg-zinc-800 hover:bg-zinc-700 py-5 rounded-2xl text-3xl font-black border border-zinc-700/50">5</button>
                <button onclick="handleFoul(6)" class="bg-zinc-800 hover:bg-zinc-700 py-5 rounded-2xl text-3xl font-black border border-zinc-700/50">6</button>
                <button onclick="handleFoul(7)" class="bg-zinc-800 hover:bg-zinc-700 py-5 rounded-2xl text-3xl font-black border border-zinc-700/50">7</button>
            </div>
            <button onclick="toggleFoulMenu(false)" class="w-full mt-6 text-zinc-500 py-2 font-bold uppercase text-xs tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        // --- PWA Installation Logic ---
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBtn.classList.add('hidden');
            deferredPrompt = null;
        });

        // --- Game Logic ---
        const BALL_VALUES = { red: 1, yellow: 2, green: 3, brown: 4, blue: 5, pink: 6, black: 7 };
        const COLOR_ORDER = ['yellow', 'green', 'brown', 'blue', 'pink', 'black'];

        let state = {
            gameStarted: false,
            redConfig: 15,
            players: [
                { name: "Player 1", score: 0, frames: 0 },
                { name: "Player 2", score: 0, frames: 0 }
            ],
            activeIdx: 0,
            redsLeft: 15,
            phase: 'red',
            currentBreak: 0,
            ptsOnTable: 147
        };

        let history = [];

        function setFormat(n) {
            state.redConfig = n;
            document.getElementById('btn-15').className = n === 15 ? 'py-4 rounded-2xl font-bold transition-all border-2 bg-zinc-800 border-green-500 text-white' : 'py-4 rounded-2xl font-bold transition-all border-2 bg-zinc-900/50 border-zinc-800 text-zinc-500';
            document.getElementById('btn-10').className = n === 10 ? 'py-4 rounded-2xl font-bold transition-all border-2 bg-zinc-800 border-green-500 text-white' : 'py-4 rounded-2xl font-bold transition-all border-2 bg-zinc-900/50 border-zinc-800 text-zinc-500';
        }

        function startGame() {
            state.players[0].name = document.getElementById('p1-input').value || "Player 1";
            state.players[1].name = document.getElementById('p2-input').value || "Player 2";
            state.redsLeft = state.redConfig;
            state.phase = 'red';
            state.currentBreak = 0;
            state.gameStarted = true;
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            updateUI();
        }

        function saveHistory() {
            history.push(JSON.parse(JSON.stringify(state)));
            if (history.length > 50) history.shift();
        }

        function handleUndo() {
            if (history.length === 0) return;
            state = history.pop();
            updateUI();
        }

        function handlePot(ball) {
            saveHistory();
            const val = BALL_VALUES[ball];
            state.players[state.activeIdx].score += val;
            state.currentBreak += val;

            if (state.phase === 'red') {
                state.redsLeft--;
                state.phase = 'color';
            } else if (state.phase === 'color') {
                state.phase = state.redsLeft > 0 ? 'red' : 'clear-yellow';
            } else if (state.phase.startsWith('clear-')) {
                const currentColor = state.phase.replace('clear-', '');
                const idx = COLOR_ORDER.indexOf(currentColor);
                if (idx < COLOR_ORDER.length - 1) {
                    state.phase = `clear-${COLOR_ORDER[idx+1]}`;
                } else {
                    state.phase = 'end';
                }
            }
            updateUI();
        }

        function handleMiss() {
            saveHistory();
            state.currentBreak = 0;
            if (state.phase === 'color' && state.redsLeft === 0) {
                state.phase = 'clear-yellow';
            } else if (state.phase === 'color' && state.redsLeft > 0) {
                state.phase = 'red';
            }
            state.activeIdx = state.activeIdx === 0 ? 1 : 0;
            updateUI();
        }

        function handleFoul(pts) {
            saveHistory();
            const opponentIdx = state.activeIdx === 0 ? 1 : 0;
            state.players[opponentIdx].score += pts;
            state.currentBreak = 0;
            if (state.phase === 'color' && state.redsLeft === 0) {
                state.phase = 'clear-yellow';
            } else if (state.phase === 'color' && state.redsLeft > 0) {
                state.phase = 'red';
            }
            state.activeIdx = opponentIdx;
            toggleFoulMenu(false);
            updateUI();
        }

        function resetFrame() {
            if (!confirm("Reset frame?")) return;
            saveHistory();
            state.players[0].score = 0;
            state.players[1].score = 0;
            state.redsLeft = state.redConfig;
            state.phase = 'red';
            state.currentBreak = 0;
            updateUI();
        }

        function endFrame() {
            const winner = state.players[0].score > state.players[1].score ? 0 : 1;
            state.players[winner].frames++;
            state.players[0].score = 0;
            state.players[1].score = 0;
            state.redsLeft = state.redConfig;
            state.phase = 'red';
            state.currentBreak = 0;
            state.activeIdx = winner;
            updateUI();
        }

        function setActivePlayer(idx) {
            if (state.activeIdx === idx) return;
            saveHistory();
            state.activeIdx = idx;
            state.currentBreak = 0;
            updateUI();
        }

        function toggleFoulMenu(show) {
            document.getElementById('foul-modal').classList.toggle('hidden', !show);
        }

        function updateUI() {
            document.getElementById('p1-name-display').innerText = state.players[0].name;
            document.getElementById('p2-name-display').innerText = state.players[1].name;
            document.getElementById('p1-score').innerText = state.players[0].score;
            document.getElementById('p2-score').innerText = state.players[1].score;
            document.getElementById('format-display').innerText = `${state.redConfig} REDS`;

            renderFrames('p1-frames', state.players[0].frames);
            renderFrames('p2-frames', state.players[1].frames);

            document.getElementById('p1-card').className = `p-6 rounded-3xl border-2 transition-all ${state.activeIdx === 0 ? 'bg-zinc-900 border-green-500 active-glow' : 'bg-zinc-900/50 border-zinc-800 opacity-60'}`;
            document.getElementById('p2-card').className = `p-6 rounded-3xl border-2 transition-all ${state.activeIdx === 1 ? 'bg-zinc-900 border-green-500 active-glow' : 'bg-zinc-900/50 border-zinc-800 opacity-60'}`;

            const b1 = document.getElementById('p1-break');
            const b2 = document.getElementById('p2-break');
            b1.innerText = `Break: ${state.currentBreak}`;
            b2.innerText = `Break: ${state.currentBreak}`;
            b1.classList.toggle('hidden', state.activeIdx !== 0 || state.currentBreak === 0);
            b2.classList.toggle('hidden', state.activeIdx !== 1 || state.currentBreak === 0);

            document.getElementById('reds-count').innerText = state.redsLeft;
            
            let targetText = "";
            if (state.phase === 'red') targetText = "RED";
            else if (state.phase === 'color') targetText = "ANY COLOR";
            else if (state.phase === 'end') targetText = "FRAME OVER";
            else targetText = state.phase.replace('clear-', '');
            
            document.getElementById('target-ball').innerText = targetText;
            
            let rem = 0;
            if (state.redsLeft > 0) {
                rem = (state.redsLeft * 8) + 27;
            } else {
                const clearColor = state.phase.replace('clear-', '');
                const cIdx = COLOR_ORDER.indexOf(clearColor);
                if (cIdx !== -1) {
                    for(let i=cIdx; i<COLOR_ORDER.length; i++) rem += BALL_VALUES[COLOR_ORDER[i]];
                } else if (state.phase === 'color') {
                    rem = 34;
                }
            }
            document.getElementById('pts-table').innerText = rem;
            updateBallButtons();
        }

        function renderFrames(id, count) {
            const el = document.getElementById(id);
            el.innerHTML = '';
            for(let i=0; i<count; i++) {
                const dot = document.createElement('div');
                dot.className = "w-2 h-2 rounded-full bg-yellow-500";
                el.appendChild(dot);
            }
        }

        function updateBallButtons() {
            const isRedPhase = state.phase === 'red';
            const isColorPhase = state.phase === 'color';
            const clearingColor = state.phase.startsWith('clear-') ? state.phase.replace('clear-', '') : null;

            setBallEnabled('ball-red', state.redsLeft > 0 && (isRedPhase || isColorPhase));
            COLOR_ORDER.forEach(color => {
                let enabled = false;
                if (isColorPhase) enabled = true;
                if (clearingColor === color) enabled = true;
                setBallEnabled(`ball-${color}`, enabled);
            });
        }

        function setBallEnabled(id, enabled) {
            const el = document.getElementById(id);
            el.disabled = !enabled;
            el.style.opacity = enabled ? "1" : "0.1";
            el.style.filter = enabled ? "none" : "grayscale(1)";
        }
    </script>
</body>
